name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    name: Core module (DecisionLog)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_26.3.app

      - name: Show versions
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build & test core module
        run: |
          set -o pipefail
          xcodebuild test \
            -project DecisionLog/DecisionLog.xcodeproj \
            -scheme DecisionLog \
            -destination 'platform=macOS' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
